<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Reviews</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>All Car Reviews</h2>

<table class="table table-striped mt-3">
    <thead class="table-dark">
    <tr>
        <th>Car ID</th>
        <th>Rating</th>
        <th>Comment</th>
        <th>Date</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="r : ${allReviews}">
        <td th:text="${r.carId}"></td>
        <td th:text="${r.rating} + ' Stars'"></td>
        <td th:text="${r.comment}"></td>
        <td th:text="${#temporals.format(r.createdAt, 'yyyy-MM-dd HH:mm')}"></td>

        <td>
            <a th:href="@{'/edit-review/' + ${r.id}}" class="btn btn-warning btn-sm">Edit</a>

            <a th:href="@{'/delete-review/' + ${r.id}}" class="btn btn-danger btn-sm"
               onclick="return confirm('Are you sure?')">Delete</a>
        </td>
    </tr>
    </tbody>
</table>

<div class="mt-3">
    <a href="/add-review" class="btn btn-success">Add Another Review</a>
</div>
</body>
</html>
