<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Review</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="card shadow p-4">
    <h2>Edit Your Review</h2>
    <form th:action="@{'/update-review/' + ${review.id}}" th:object="${review}" method="post">
        <div class="mb-3">
            <label class="form-label">Car ID</label>
            <input type="number" th:field="*{carId}" class="form-control" readonly>
        </div>
        <div class="mb-3">
            <label class="form-label">Rating</label>
            <select th:field="*{rating}" class="form-select">
                <option value="1">1 - Poor</option>
                <option value="2">2 - Fair</option>
                <option value="3">3 - Good</option>
                <option value="4">4 - Very Good</option>
                <option value="5">5 - Excellent</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Comment</label>
            <textarea th:field="*{comment}" class="form-control" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-warning">Update Review</button>
        <a href="/reviews" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
