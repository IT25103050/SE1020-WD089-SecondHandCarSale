<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Car Review</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="card shadow p-4">
    <h2>Submit a Car Review</h2>
    <form th:action="@{/save-review}" th:object="${review}" method="post">
        <div class="mb-3">
            <label class="form-label">Car ID (Temporary)</label>
            <input type="number" th:field="*{carId}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Rating (1-5)</label>
            <select th:field="*{rating}" class="form-select">
                <option value="1">1 - Poor</option>
                <option value="2">2 - Fair</option>
                <option value="3">3 - Good</option>
                <option value="4">4 - Very Good</option>
                <option value="5">5 - Excellent</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Your Comment</label>
            <textarea th:field="*{comment}" class="form-control" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Submit Review</button>
    </form>
</div>
</body>
</html>
